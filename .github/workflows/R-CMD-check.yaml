# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      _R_CHECK_ELAPSED_TIMEOUT_: 1800

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config hdf5

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libhdf5-dev

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Locate Rtools: try env var first, then search C:\ for rtools* directories
          $rtools = ($env:RTOOLS44_HOME -replace '\\$', '')
          if (-not $rtools -or -not (Test-Path "$rtools\usr\bin\pacman.exe")) {
            $rtools = Get-ChildItem C:\ -Directory -Filter "rtools*" -ErrorAction SilentlyContinue |
              Where-Object { Test-Path "$($_.FullName)\usr\bin\pacman.exe" } |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $rtools) { throw "Could not locate Rtools installation" }
          Write-Host "Rtools found at: $rtools"
          & "$rtools\usr\bin\pacman.exe" --noconfirm -Sy mingw-w64-x86_64-hdf5
          # Verify install
          Write-Host "HDF5 headers:"
          Get-ChildItem "$rtools\mingw64\include" -Filter "hdf5.h" -ErrorAction SilentlyContinue
          Write-Host "HDF5 libs:"
          Get-ChildItem "$rtools\mingw64\lib" -Filter "*hdf5*" -ErrorAction SilentlyContinue
          Write-Host "HDF5 DLLs:"
          Get-ChildItem "$rtools\mingw64\bin" -Filter "*hdf5*" -ErrorAction SilentlyContinue
          # Add mingw64/bin to PATH so HDF5 DLLs are found at runtime
          "$rtools\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get ilike compile-cache path
        id: cache-path
        shell: Rscript {0}
        run: |
          p <- tools::R_user_dir("ilike", "cache")
          cat(sprintf("path=%s\n", p), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)

      - name: Restore ilike compile cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-path.outputs.path }}
          key: ilike-compile-cache-${{ matrix.config.os }}-${{ matrix.config.r }}-${{ hashFiles('R/parse_ilike_model.R', 'inst/extdata/*.ilike') }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        timeout-minutes: 60
        with:
          upload-snapshots: true
          error-on: ' "error" '
          args: 'c("--no-manual", "--as-cran")'

      - name: Upload R CMD check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rcmdcheck-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: check/**/*
          
